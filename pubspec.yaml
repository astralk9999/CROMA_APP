name: croma_app
description: "CROMA - Urban Streetwear Store"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase for auth and database
  supabase_flutter: ^2.8.4
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # UI and Images
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Payments
  flutter_stripe: ^11.4.0
  
  # Storage and persistence
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  
  # Environment variables
  flutter_dotenv: ^5.2.1
  
  # Utils
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/.env
  
