name: fashion_store
description: CROMA - Premium Streetwear Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  supabase_flutter: ^2.8.3

  # Payments
  flutter_stripe: ^11.3.0

  # Images
  cached_network_image: ^3.4.1

  # Environment
  flutter_dotenv: ^5.2.1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.3.4

  # UI
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  pdf: ^3.11.3
  printing: ^5.14.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  build_resolvers: 2.4.3
  build_runner_core: 8.0.0
  build_runner: 2.4.14

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_c_horns.png"
  web:
    generate: true
    image_path: "assets/images/logo_c_horns.png"
    background_color: "#ffffff"
    theme_color: "#000000"
